<!doctype html>
<html>
<head>
<title>Title dari Head</title>
</head>
<body>
<h4 align="center">
Merge Row and Column Table 
</h4>
<table border="2px" style="text-align: center;height: 250px" width="500px" align="center">
<tr><td>1,1</td><td>1,2</td><td colspan="2">1,3</td></tr>
<tr><td colspan="2" rowspan="2">2,1</td><td>2,3</td><td rowspan="2">2,4</td></tr>
<tr><td>3,3</td></tr>
</body>
</html>
