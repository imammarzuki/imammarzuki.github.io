<!doctype html>
<html>
<head>
<title>Belajar Membuat Form</title>
</head>
<body>
<form action="formulir.html" method="get">
Nama: <input type="text" name="nama">
<br>
Password: <input type="password" name="password">
<br>
Jenis Kelamin: <input type="radio" name="jenis_kelamin"> Laki-Laki
<input type="radio" name="jenis_kelamin"> Perempuan
<br>
Hobi: <input type="checkbox" name="hobi_baca"> Membaca Buku
<input type="checkbox" name="hobi_nulis"> Menulis
<input type="checkbox" name="hobi_mancing"> Memancing
<br>
Asal Kota: <select name="asal_kota">
<option>Jakarta</option>
<option>Bandung</option>
<option>Semarang</option>
</select>
<br>
Komentar Anda : <br>
<textarea name="komentar" rows="5" cols="20">
Silahkan katakan isi hati Anda
</textarea>
<br>
<input type="submit" value="Mulai Proses!">
</form>
</body>
</html>
